<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EmailBuddy Companion</title>
    <style>
      :root {
        --bg: #f6f1e9;
        --bg-soft: #efe7dc;
        --card: #fffdf8;
        --ink: #2e241b;
        --muted: #705f51;
        --line: #d8c8b8;
        --accent: #2f6f8f;
        --accent-2: #4f8f66;
        --danger: #a33a2f;
        --ok: #2f7b3f;
        --radius: 14px;
        --shadow: 0 10px 30px rgba(38, 23, 6, 0.08);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--bg);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      .shell {
        max-width: 1320px;
        margin: 28px auto;
        padding: 0 16px 24px;
      }

      h1, h2, h3 {
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        margin: 0;
      }

      h1 { font-size: 2rem; letter-spacing: 0.01em; }
      p { margin: 0; }

      .hero {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .hero p { color: var(--muted); }

      .tabs {
        display: inline-flex;
        gap: 6px;
        padding: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--bg-soft);
        margin: 14px 0 18px;
      }

      .subtabs {
        margin: 0 0 10px;
      }

      .tab {
        border: 0;
        border-radius: 999px;
        padding: 9px 14px;
        background: transparent;
        color: var(--muted);
        font-weight: 700;
        cursor: pointer;
      }

      .tab[aria-selected="true"] {
        background: #fff;
        color: var(--ink);
        box-shadow: 0 3px 10px rgba(58, 42, 27, 0.13);
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--card);
        box-shadow: var(--shadow);
        padding: 16px;
        display: grid;
        gap: 14px;
        animation: panel-in 180ms ease;
      }

      @keyframes panel-in {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      [role="tabpanel"][hidden] { display: none; }

      .subpanel {
        display: grid;
        gap: 10px;
        padding: 2px 0;
      }

      .grid-two {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      label { font-weight: 700; font-size: 0.92rem; }

      textarea,
      input,
      select,
      button {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px 11px;
        background: #fff;
        color: var(--ink);
        font: inherit;
      }

      textarea {
        min-height: 240px;
        resize: vertical;
        font-family: "Menlo", "Consolas", monospace;
        font-size: 13px;
      }

      .row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        flex-wrap: wrap;
      }

      .row.ollama-row {
        align-items: flex-start;
      }

      .field {
        display: grid;
        gap: 6px;
        flex: 1 1 240px;
        min-width: 220px;
      }

      .field > label {
        margin: 0;
      }

      button {
        cursor: pointer;
        font-weight: 700;
        transition: transform 160ms ease, box-shadow 160ms ease;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 5px 12px rgba(38, 23, 6, 0.14);
      }

      .primary { background: var(--accent); color: #fff; border-color: transparent; }
      .secondary { background: #f6efe4; }

      .status {
        min-height: 20px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .status.ok { color: var(--ok); }
      .status.error { color: var(--danger); }

      .providers {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 8px;
      }

      .provider-item {
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 10px;
        background: #fff;
      }

      .provider-item.dragging {
        opacity: 0.7;
        box-shadow: 0 8px 18px rgba(38, 23, 6, 0.18);
      }

      .provider-item.drop-target {
        outline: 2px dashed var(--accent);
        outline-offset: 2px;
      }

      .drag-handle {
        border: 1px dashed var(--line);
        border-radius: 8px;
        width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        color: var(--muted);
        cursor: grab;
        user-select: none;
      }

      .provider-label { font-weight: 700; min-width: 120px; }

      .provider-actions {
        display: flex;
        gap: 6px;
        margin-left: auto;
      }

      .provider-actions button {
        padding: 6px 8px;
        font-size: 12px;
      }

      .hint { color: var(--muted); font-size: 0.88rem; }

      input,
      select,
      textarea {
        width: 100%;
      }

      #openai-model,
      #anthropic-model,
      #remote-ollama-model,
      #local-ollama-model {
        max-width: 260px;
      }

      @media (max-width: 760px) {
        .shell { padding: 0 12px 20px; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <h1>EmailBuddy Companion</h1>
      </header>

      <div class="tabs" role="tablist" aria-label="Companion panels">
        <button id="tab-rewrite" class="tab" role="tab" aria-controls="panel-rewrite" aria-selected="true" tabindex="0">Test</button>
        <button id="tab-settings" class="tab" role="tab" aria-controls="panel-settings" aria-selected="false" tabindex="-1">Settings</button>
        <button id="tab-style" class="tab" role="tab" aria-controls="panel-style" aria-selected="false" tabindex="-1">Style</button>
      </div>

      <section id="panel-rewrite" class="panel" role="tabpanel" aria-labelledby="tab-rewrite">
        <div class="row">
          <div class="field">
            <label for="mode">Mode</label>
            <select id="mode">
              <option value="casual">casual</option>
              <option value="polished">polished</option>
              <option value="concise">concise</option>
            </select>
          </div>
          <button id="rewrite" class="primary" type="button">Rewrite</button>
        </div>

        <div class="grid-two">
          <div>
            <label for="input">Input</label>
            <textarea id="input" placeholder="Paste or write a draft..."></textarea>
          </div>
          <div>
            <label for="output">Output</label>
            <textarea id="output" readonly></textarea>
          </div>
        </div>

        <p id="rewrite-status" class="status"></p>
      </section>

      <section id="panel-settings" class="panel" role="tabpanel" aria-labelledby="tab-settings" hidden>
        <div class="tabs subtabs" role="tablist" aria-label="Settings sections">
          <button id="tab-model-order" class="tab" role="tab" aria-controls="panel-model-order" aria-selected="true" tabindex="0">Model Order</button>
          <button id="tab-ollama" class="tab" role="tab" aria-controls="panel-ollama" aria-selected="false" tabindex="-1">Ollama</button>
          <button id="tab-cloud-apis" class="tab" role="tab" aria-controls="panel-cloud-apis" aria-selected="false" tabindex="-1">Cloud APIs</button>
        </div>

        <section id="panel-model-order" class="subpanel" role="tabpanel" aria-labelledby="tab-model-order">
          <p class="hint">Enabled models are tried in this order. Disabled models are not used.</p>
          <h3>Enabled Models</h3>
          <ul id="enabled-models" class="providers"></ul>

          <h3>Disabled Models</h3>
          <ul id="disabled-models" class="providers"></ul>

          <h3>Runtime</h3>
          <div class="row">
            <div class="field">
              <label for="timeout-ms">Timeout (ms)</label>
              <input id="timeout-ms" type="number" min="1000" max="60000" step="100" />
            </div>
            <div class="field">
              <label for="history-mode">History</label>
              <select id="history-mode">
                <option value="disabled">Disabled</option>
                <option value="enabled">Enabled</option>
              </select>
            </div>
          </div>
        </section>

        <section id="panel-ollama" class="subpanel" role="tabpanel" aria-labelledby="tab-ollama" hidden>
          <h3>Remote Ollama</h3>
          <div class="row ollama-row">
            <div class="field">
              <label for="remote-ollama-url">URL</label>
              <input id="remote-ollama-url" type="text" placeholder="http://192.168.1.10:11434" />
            </div>
            <div class="field">
              <label for="remote-ollama-model">Model</label>
              <select id="remote-ollama-model"></select>
              <p id="remote-ollama-model-hint" class="hint"></p>
            </div>
          </div>

          <h3>Local Ollama</h3>
          <div class="row ollama-row">
            <div class="field">
              <label for="local-ollama-url">URL</label>
              <input id="local-ollama-url" type="text" placeholder="http://127.0.0.1:11434" />
            </div>
            <div class="field">
              <label for="local-ollama-model">Model</label>
              <select id="local-ollama-model"></select>
              <p id="local-ollama-model-hint" class="hint"></p>
            </div>
          </div>
        </section>

        <section id="panel-cloud-apis" class="subpanel" role="tabpanel" aria-labelledby="tab-cloud-apis" hidden>
          <h3>OpenAI</h3>
          <div class="row">
            <div class="field">
              <label for="openai-model">Model</label>
              <select id="openai-model"></select>
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label for="openai-key">API key</label>
              <input id="openai-key" type="password" placeholder="sk-..." />
            </div>
            <button id="save-openai" class="secondary" type="button">Save OpenAI key</button>
          </div>

          <h3>Anthropic</h3>
          <div class="row">
            <div class="field">
              <label for="anthropic-model">Model</label>
              <select id="anthropic-model"></select>
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label for="anthropic-key">API key</label>
              <input id="anthropic-key" type="password" placeholder="sk-ant-..." />
            </div>
            <button id="save-anthropic" class="secondary" type="button">Save Anthropic key</button>
          </div>
        </section>

        <div class="row">
          <button id="save-config" class="primary" type="button">Save config</button>
        </div>

        <p id="config-status" class="status"></p>
        <p id="secrets-status" class="status"></p>
      </section>

      <section id="panel-style" class="panel" role="tabpanel" aria-labelledby="tab-style" hidden>
        <p class="hint">Edit `~/.emailbuddy/STYLE.md` and save changes directly.</p>
        <label for="style-editor">STYLE.md</label>
        <textarea id="style-editor" spellcheck="false"></textarea>
        <div class="row">
          <button id="save-style" class="primary" type="button">Save STYLE.md</button>
        </div>
        <p id="style-status" class="status"></p>
      </section>
    </main>

    <script>
      const topTabs = ['tab-rewrite', 'tab-settings', 'tab-style']
        .map((id) => document.getElementById(id))
        .filter(Boolean);
      const topPanels = ['panel-rewrite', 'panel-settings', 'panel-style']
        .map((id) => document.getElementById(id))
        .filter(Boolean);
      const settingsTabs = ['tab-model-order', 'tab-ollama', 'tab-cloud-apis']
        .map((id) => document.getElementById(id))
        .filter(Boolean);
      const settingsPanels = ['panel-model-order', 'panel-ollama', 'panel-cloud-apis']
        .map((id) => document.getElementById(id))
        .filter(Boolean);

      const modeEl = document.getElementById('mode');
      const inputEl = document.getElementById('input');
      const outputEl = document.getElementById('output');
      const rewriteStatusEl = document.getElementById('rewrite-status');
      const rewriteBtn = document.getElementById('rewrite');

      const enabledListEl = document.getElementById('enabled-models');
      const disabledListEl = document.getElementById('disabled-models');
      const timeoutEl = document.getElementById('timeout-ms');
      const historyModeEl = document.getElementById('history-mode');
      const saveConfigBtn = document.getElementById('save-config');
      const configStatusEl = document.getElementById('config-status');

      const openaiKeyEl = document.getElementById('openai-key');
      const anthropicKeyEl = document.getElementById('anthropic-key');
      const openaiModelEl = document.getElementById('openai-model');
      const anthropicModelEl = document.getElementById('anthropic-model');
      const remoteOllamaUrlEl = document.getElementById('remote-ollama-url');
      const remoteOllamaModelEl = document.getElementById('remote-ollama-model');
      const remoteOllamaModelHintEl = document.getElementById('remote-ollama-model-hint');
      const localOllamaUrlEl = document.getElementById('local-ollama-url');
      const localOllamaModelEl = document.getElementById('local-ollama-model');
      const localOllamaModelHintEl = document.getElementById('local-ollama-model-hint');
      const saveOpenAiBtn = document.getElementById('save-openai');
      const saveAnthropicBtn = document.getElementById('save-anthropic');
      const secretsStatusEl = document.getElementById('secrets-status');
      const styleEditorEl = document.getElementById('style-editor');
      const saveStyleBtn = document.getElementById('save-style');
      const styleStatusEl = document.getElementById('style-status');

      let endpointMap = new Map();
      let enabledOrder = [];
      let disabledOrder = [];
      let draggingEnabledId = null;
      let modelCatalog = {
        cloud: { openai: [], anthropic: [] },
        ollama: {}
      };

      function setStatus(el, message, type = 'muted') {
        el.textContent = message;
        el.classList.remove('ok', 'error');
        if (type === 'ok') el.classList.add('ok');
        if (type === 'error') el.classList.add('error');
      }

      function activateTabGroup(tabs, panels, tabId) {
        tabs.forEach((tab) => {
          const selected = tab.id === tabId;
          tab.setAttribute('aria-selected', String(selected));
          tab.setAttribute('tabindex', selected ? '0' : '-1');
        });

        panels.forEach((panel) => {
          panel.hidden = panel.getAttribute('aria-labelledby') !== tabId;
        });
      }

      function bindTabs(tabs, panels) {
        tabs.forEach((tab, index) => {
          tab.addEventListener('click', () => activateTabGroup(tabs, panels, tab.id));
          tab.addEventListener('keydown', (event) => {
            if (!['ArrowLeft', 'ArrowRight', 'Home', 'End'].includes(event.key)) return;
            event.preventDefault();
            let next = index;
            if (event.key === 'ArrowRight') next = (index + 1) % tabs.length;
            if (event.key === 'ArrowLeft') next = (index - 1 + tabs.length) % tabs.length;
            if (event.key === 'Home') next = 0;
            if (event.key === 'End') next = tabs.length - 1;
            tabs[next].focus();
            activateTabGroup(tabs, panels, tabs[next].id);
          });
        });
      }

      bindTabs(topTabs, topPanels);
      bindTabs(settingsTabs, settingsPanels);

      function reorderEnabled(from, to) {
        if (from < 0 || to < 0 || from === to || from >= enabledOrder.length || to >= enabledOrder.length) {
          return;
        }
        const next = [...enabledOrder];
        const [moved] = next.splice(from, 1);
        next.splice(to, 0, moved);
        enabledOrder = next;
        renderModelLists();
      }

      function reorderEnabledById(draggedId, targetId) {
        const from = enabledOrder.indexOf(draggedId);
        const to = enabledOrder.indexOf(targetId);
        if (from === -1 || to === -1 || from === to) return;
        reorderEnabled(from, to);
      }

      function disableModel(id) {
        enabledOrder = enabledOrder.filter((entry) => entry !== id);
        disabledOrder = disabledOrder.filter((entry) => entry !== id);
        disabledOrder.push(id);
        renderModelLists();
      }

      function enableModel(id) {
        disabledOrder = disabledOrder.filter((entry) => entry !== id);
        enabledOrder = enabledOrder.filter((entry) => entry !== id);
        enabledOrder.push(id);
        renderModelLists();
      }

      function renderEnabledList() {
        enabledListEl.innerHTML = '';
        enabledOrder.forEach((id, index) => {
          const endpoint = endpointMap.get(id);
          if (!endpoint) return;

          const li = document.createElement('li');
          li.className = 'provider-item';
          li.draggable = true;
          li.dataset.modelId = id;
          li.addEventListener('dragstart', (event) => {
            draggingEnabledId = id;
            li.classList.add('dragging');
            if (event.dataTransfer) {
              event.dataTransfer.effectAllowed = 'move';
              event.dataTransfer.setData('text/plain', id);
            }
          });
          li.addEventListener('dragend', () => {
            draggingEnabledId = null;
            li.classList.remove('dragging');
            enabledListEl.querySelectorAll('.drop-target').forEach((node) => node.classList.remove('drop-target'));
          });
          li.addEventListener('dragover', (event) => {
            if (!draggingEnabledId || draggingEnabledId === id) return;
            event.preventDefault();
            li.classList.add('drop-target');
          });
          li.addEventListener('dragleave', () => {
            li.classList.remove('drop-target');
          });
          li.addEventListener('drop', (event) => {
            event.preventDefault();
            li.classList.remove('drop-target');
            const draggedId = draggingEnabledId || event.dataTransfer?.getData('text/plain');
            if (!draggedId || draggedId === id) return;
            reorderEnabledById(draggedId, id);
          });

          const handle = document.createElement('span');
          handle.className = 'drag-handle';
          handle.title = 'Drag to reorder';
          handle.textContent = '::';

          const label = document.createElement('span');
          label.className = 'provider-label';
          label.textContent = `${index + 1}. ${endpoint.label} (${endpoint.type})`;

          const actions = document.createElement('div');
          actions.className = 'provider-actions';

          const disableBtn = document.createElement('button');
          disableBtn.type = 'button';
          disableBtn.className = 'secondary';
          disableBtn.textContent = 'Disable';
          disableBtn.addEventListener('click', () => disableModel(id));

          actions.append(disableBtn);
          li.append(handle, label, actions);
          enabledListEl.appendChild(li);
        });
      }

      function renderDisabledList() {
        disabledListEl.innerHTML = '';
        disabledOrder.forEach((id, index) => {
          const endpoint = endpointMap.get(id);
          if (!endpoint) return;

          const li = document.createElement('li');
          li.className = 'provider-item';

          const label = document.createElement('span');
          label.className = 'provider-label';
          label.textContent = `${index + 1}. ${endpoint.label} (${endpoint.type})`;

          const actions = document.createElement('div');
          actions.className = 'provider-actions';

          const enableBtn = document.createElement('button');
          enableBtn.type = 'button';
          enableBtn.className = 'secondary';
          enableBtn.textContent = 'Enable';
          enableBtn.addEventListener('click', () => enableModel(id));

          actions.append(enableBtn);
          li.append(label, actions);
          disabledListEl.appendChild(li);
        });
      }

      function renderModelLists() {
        renderEnabledList();
        renderDisabledList();
      }

      function getEndpoint(id) {
        return endpointMap.get(id) ?? null;
      }

      function upsertEndpoint(nextEndpoint) {
        endpointMap.set(nextEndpoint.id, nextEndpoint);
      }

      function clearSelect(selectEl) {
        selectEl.innerHTML = '';
      }

      function appendOption(selectEl, value, label) {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = label;
        selectEl.appendChild(option);
      }

      function populateCloudModelSelect(selectEl, models, configuredModel) {
        clearSelect(selectEl);
        const normalizedModels = Array.isArray(models) ? models : [];
        for (const model of normalizedModels) {
          appendOption(selectEl, model, model);
        }

        if (!normalizedModels.length) {
          appendOption(selectEl, '', 'No models available');
          selectEl.value = '';
          return;
        }

        const fallback = normalizedModels[0];
        selectEl.value = normalizedModels.includes(configuredModel) ? configuredModel : fallback;
      }

      function setOllamaModelField({
        selectEl,
        hintEl,
        configuredModel,
        models,
        ok,
        error
      }) {
        clearSelect(selectEl);
        const normalizedModels = Array.isArray(models) ? models : [];
        const hasConfigured = configuredModel && normalizedModels.includes(configuredModel);

        if (normalizedModels.length) {
          for (const model of normalizedModels) {
            appendOption(selectEl, model, model);
          }
          if (hasConfigured) {
            selectEl.value = configuredModel;
          } else if (configuredModel) {
            appendOption(selectEl, configuredModel, `${configuredModel} (current)`);
            selectEl.value = configuredModel;
          } else {
            selectEl.value = normalizedModels[0];
          }
          hintEl.textContent = ok ? '' : `Using discovered models (${error}).`;
          return;
        }

        if (configuredModel) {
          appendOption(selectEl, configuredModel, `${configuredModel} (current)`);
          selectEl.value = configuredModel;
        } else {
          appendOption(selectEl, '', 'No models available');
          selectEl.value = '';
        }
        hintEl.textContent = error ? `Model discovery unavailable: ${error}` : 'Model discovery unavailable.';
      }

      function getSelectedOllamaModel(selectEl) {
        return selectEl.value.trim();
      }

      function applyModelCatalogToForms() {
        const remote = getEndpoint('remote-ollama');
        const local = getEndpoint('local-ollama');
        const openai = getEndpoint('openai');
        const anthropic = getEndpoint('anthropic');

        populateCloudModelSelect(
          openaiModelEl,
          modelCatalog?.cloud?.openai ?? [],
          openai?.config?.model ?? ''
        );
        populateCloudModelSelect(
          anthropicModelEl,
          modelCatalog?.cloud?.anthropic ?? [],
          anthropic?.config?.model ?? ''
        );

        const remoteModelInfo = modelCatalog?.ollama?.['remote-ollama'] ?? {
          ok: false,
          models: [],
          error: 'No response from backend'
        };
        setOllamaModelField({
          selectEl: remoteOllamaModelEl,
          hintEl: remoteOllamaModelHintEl,
          configuredModel: remote?.config?.model ?? '',
          ...remoteModelInfo
        });

        const localModelInfo = modelCatalog?.ollama?.['local-ollama'] ?? {
          ok: false,
          models: [],
          error: 'No response from backend'
        };
        setOllamaModelField({
          selectEl: localOllamaModelEl,
          hintEl: localOllamaModelHintEl,
          configuredModel: local?.config?.model ?? '',
          ...localModelInfo
        });
      }

      function syncEndpointFormFields() {
        const remote = getEndpoint('remote-ollama');
        const local = getEndpoint('local-ollama');

        if (remote) {
          remoteOllamaUrlEl.value = remote.config?.baseUrl ?? '';
        }

        if (local) {
          localOllamaUrlEl.value = local.config?.baseUrl ?? '';
        }

        applyModelCatalogToForms();
      }

      function collectEndpointsForSave() {
        const remote = getEndpoint('remote-ollama');
        const local = getEndpoint('local-ollama');
        const openai = getEndpoint('openai');
        const anthropic = getEndpoint('anthropic');

        if (!remote || !local || !openai || !anthropic) {
          throw new Error('Missing required endpoint configuration. Reload the page.');
        }

        upsertEndpoint({
          ...remote,
          config: {
            ...remote.config,
            baseUrl: remoteOllamaUrlEl.value.trim(),
            model: getSelectedOllamaModel(remoteOllamaModelEl)
          }
        });

        upsertEndpoint({
          ...local,
          config: {
            ...local.config,
            baseUrl: localOllamaUrlEl.value.trim(),
            model: getSelectedOllamaModel(localOllamaModelEl)
          }
        });

        upsertEndpoint({
          ...openai,
          config: {
            ...openai.config,
            model: openaiModelEl.value.trim()
          }
        });

        upsertEndpoint({
          ...anthropic,
          config: {
            ...anthropic.config,
            model: anthropicModelEl.value.trim()
          }
        });

        const orderedIds = [...enabledOrder, ...disabledOrder];
        const orderedSet = new Set(orderedIds);
        const extras = Array.from(endpointMap.values())
          .map((endpoint) => endpoint.id)
          .filter((id) => !orderedSet.has(id));

        return [...orderedIds, ...extras].map((id) => {
          const endpoint = endpointMap.get(id);
          const { enabled, ...rest } = endpoint;
          return rest;
        });
      }

      function deriveRouting(configBody) {
        const routing = configBody?.routing ?? {};
        if (Array.isArray(routing.enabled) || Array.isArray(routing.disabled)) {
          return {
            enabled: [...(routing.enabled ?? [])],
            disabled: [...(routing.disabled ?? [])]
          };
        }

        return {
          enabled: [...(routing.primary ?? []), ...(routing.fallback ?? [])],
          disabled: []
        };
      }

      async function refreshSecretsStatus() {
        const res = await fetch('/v1/secrets/status');
        const body = await res.json();
        if (!res.ok) throw new Error(body.error || 'Could not load secrets status');

        setStatus(
          secretsStatusEl,
          `OpenAI: ${body.openaiConfigured ? 'configured' : 'missing'} | Anthropic: ${body.anthropicConfigured ? 'configured' : 'missing'}`,
          'ok'
        );
      }

      async function loadModels() {
        try {
          const res = await fetch('/v1/models');
          const body = await res.json();
          if (!res.ok) throw new Error(body.error || 'Could not load models');
          modelCatalog = body;
        } catch {
          modelCatalog = {
            cloud: {
              openai: ['gpt-4.1-mini'],
              anthropic: ['claude-3-5-haiku-latest']
            },
            ollama: {}
          };
        }
      }

      async function loadSettings() {
        const [configRes, schemaRes] = await Promise.all([
          fetch('/v1/config'),
          fetch('/v1/config/schema')
        ]);
        const configBody = await configRes.json();
        const schemaBody = await schemaRes.json();

        if (!configRes.ok) throw new Error(configBody.error || 'Could not load config');
        if (!schemaRes.ok) throw new Error(schemaBody.error || 'Could not load config schema');

        await loadModels();
        endpointMap = new Map((configBody.endpoints ?? []).map((endpoint) => [endpoint.id, endpoint]));
        const routing = deriveRouting(configBody);
        enabledOrder = routing.enabled;
        disabledOrder = routing.disabled;
        const known = new Set([...enabledOrder, ...disabledOrder]);
        for (const endpoint of endpointMap.values()) {
          if (!known.has(endpoint.id)) {
            disabledOrder.push(endpoint.id);
          }
        }
        timeoutEl.min = String(schemaBody.constraints.timeoutMs.min);
        timeoutEl.max = String(schemaBody.constraints.timeoutMs.max);
        timeoutEl.value = String(configBody.timeoutMs);
        historyModeEl.value = configBody.history.enabled ? 'enabled' : 'disabled';
        syncEndpointFormFields();
        renderModelLists();
      }

      async function loadStyleMarkdown() {
        const res = await fetch('/v1/style');
        const body = await res.json();
        if (!res.ok) throw new Error(body.error || 'Could not load style');
        styleEditorEl.value = body.markdown ?? '';
      }

      async function saveConfig() {
        saveConfigBtn.disabled = true;
        setStatus(configStatusEl, 'Saving config...');
        try {
          const res = await fetch('/v1/config', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              endpoints: collectEndpointsForSave(),
              routing: {
                enabled: enabledOrder,
                disabled: disabledOrder
              },
              timeoutMs: Number(timeoutEl.value),
              history: { enabled: historyModeEl.value === 'enabled' }
            })
          });
          const body = await res.json();
          if (!res.ok) throw new Error(body.error || 'Could not save config');

          await loadModels();
          endpointMap = new Map((body.endpoints ?? []).map((endpoint) => [endpoint.id, endpoint]));
          const routing = deriveRouting(body);
          enabledOrder = routing.enabled;
          disabledOrder = routing.disabled;
          const known = new Set([...enabledOrder, ...disabledOrder]);
          for (const endpoint of endpointMap.values()) {
            if (!known.has(endpoint.id)) {
              disabledOrder.push(endpoint.id);
            }
          }
          timeoutEl.value = String(body.timeoutMs);
          historyModeEl.value = body.history.enabled ? 'enabled' : 'disabled';
          syncEndpointFormFields();
          renderModelLists();
          setStatus(configStatusEl, 'Config saved.', 'ok');
        } catch (error) {
          setStatus(configStatusEl, error.message, 'error');
        } finally {
          saveConfigBtn.disabled = false;
        }
      }

      async function saveSecret(account, value) {
        const res = await fetch('/v1/secrets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ account, value })
        });
        const body = await res.json();
        if (!res.ok) throw new Error(body.error || `Could not save ${account}`);
      }

      async function saveStyleMarkdown() {
        const markdown = styleEditorEl.value;
        if (!markdown.trim()) {
          setStatus(styleStatusEl, 'STYLE.md cannot be empty.', 'error');
          return;
        }

        saveStyleBtn.disabled = true;
        setStatus(styleStatusEl, 'Saving STYLE.md...');
        try {
          const res = await fetch('/v1/style', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ markdown })
          });
          const body = await res.json();
          if (!res.ok) throw new Error(body.error || 'Could not save style');

          styleEditorEl.value = body.markdown ?? markdown;
          setStatus(styleStatusEl, 'STYLE.md saved.', 'ok');
        } catch (error) {
          setStatus(styleStatusEl, error.message, 'error');
        } finally {
          saveStyleBtn.disabled = false;
        }
      }

      rewriteBtn.addEventListener('click', async () => {
        const text = inputEl.value.trim();
        if (!text) {
          setStatus(rewriteStatusEl, 'Input is empty.', 'error');
          return;
        }

        const mode = modeEl.value;

        rewriteBtn.disabled = true;
        setStatus(rewriteStatusEl, 'Rewriting...');
        try {
          const res = await fetch('/v1/rewrite', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, mode })
          });
          const body = await res.json();
          if (!res.ok) throw new Error(body.error || 'Rewrite failed');

          outputEl.value = body.rewrittenText;
          const provider = body.providerUsed ?? 'provider';
          const endpoint = body.endpointUsed ? ` (${body.endpointUsed})` : '';
          setStatus(rewriteStatusEl, `Done via ${provider}${endpoint}.`, 'ok');
        } catch (error) {
          setStatus(rewriteStatusEl, error.message, 'error');
        } finally {
          rewriteBtn.disabled = false;
        }
      });

      saveConfigBtn.addEventListener('click', saveConfig);
      saveStyleBtn.addEventListener('click', saveStyleMarkdown);

      saveOpenAiBtn.addEventListener('click', async () => {
        const value = openaiKeyEl.value.trim();
        if (!value) {
          setStatus(secretsStatusEl, 'OpenAI key is empty.', 'error');
          return;
        }

        saveOpenAiBtn.disabled = true;
        try {
          await saveSecret('openai_api_key', value);
          openaiKeyEl.value = '';
          await refreshSecretsStatus();
        } catch (error) {
          setStatus(secretsStatusEl, error.message, 'error');
        } finally {
          saveOpenAiBtn.disabled = false;
        }
      });

      saveAnthropicBtn.addEventListener('click', async () => {
        const value = anthropicKeyEl.value.trim();
        if (!value) {
          setStatus(secretsStatusEl, 'Anthropic key is empty.', 'error');
          return;
        }

        saveAnthropicBtn.disabled = true;
        try {
          await saveSecret('anthropic_api_key', value);
          anthropicKeyEl.value = '';
          await refreshSecretsStatus();
        } catch (error) {
          setStatus(secretsStatusEl, error.message, 'error');
        } finally {
          saveAnthropicBtn.disabled = false;
        }
      });

      Promise.all([loadSettings(), refreshSecretsStatus(), loadStyleMarkdown()]).catch((error) => {
        setStatus(configStatusEl, error.message, 'error');
      });

      activateTabGroup(topTabs, topPanels, 'tab-rewrite');
      activateTabGroup(settingsTabs, settingsPanels, 'tab-model-order');
    </script>
  </body>
</html>
